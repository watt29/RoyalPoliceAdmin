version: '3.8'

services:
  # Node.js Telegram Bot
  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    container_name: smart-police-bot
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PYTHON_API_URL=http://python-api:8000
      - BOT_SERVER_PORT=3000
    volumes:
      - ./shared:/app/shared:ro
    depends_on:
      - python-api
    restart: unless-stopped
    networks:
      - smart-police-network

  # Python API Services
  python-api:
    build:
      context: ./python-services
      dockerfile: Dockerfile
    container_name: smart-police-api
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
      - PYTHON_API_PORT=8000
      - BOT_API_URL=http://telegram-bot:3000
    volumes:
      - ./shared:/app/shared:ro
      - ./services:/app/services:ro
      - ./handlers:/app/handlers:ro
    restart: unless-stopped
    networks:
      - smart-police-network

  # Redis for caching and sessions (optional)
  redis:
    image: redis:7-alpine
    container_name: smart-police-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - smart-police-network
    command: redis-server --appendonly yes

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: smart-police-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/ssl/certs:ro
    depends_on:
      - telegram-bot
      - python-api
    restart: unless-stopped
    networks:
      - smart-police-network

networks:
  smart-police-network:
    driver: bridge
    name: smart-police-network

volumes:
  redis-data:
    driver: local

# Environment variables จะอ่านจากไฟล์ .env
# ต้องสร้างไฟล์ .env ในโฟลเดอร์ shared/